server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@127.0.0.1:1521/XEPDB1}
    username: ${DB_USERNAME:planbridge}
    password: ${DB_PASSWORD:planbridge123}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

planbridge:
  repos-base-path: ${REPOS_BASE_PATH:/repos}
  git-mirror:
    url: ${GIT_MIRROR_URL:http://localhost:3001}
  worker:
    url: ${WORKER_URL:http://localhost:3002}
  security:
    enabled: false
  jwt:
    secret: planbridge-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration: 86400000

logging:
  level:
    com.planbridge: DEBUG
    org.hibernate.SQL: DEBUG
